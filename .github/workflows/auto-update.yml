name: Sync

on: push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }} # Use your custom secret
          fetch-depth: 0

      # Your other steps here...
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
