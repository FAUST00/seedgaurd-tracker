name: Auto-Update #1
on:
  schedule:
    - cron: '0 12 * * *' # 🕒 Change to your timezone/cron
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "AutoBot"
          git config user.email "autobot@noreply.com"

      - name: Run your update logic
        run: |
          # 👇 REPLACE THIS BLOCK WITH YOUR ACTUAL COMMANDS
          echo "synced" > ./update-marker.txt
          echo "Updated at: $(date -u)" >> ./update-marker.txt

      - name: Detect changes
        id: detect
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected. Skipping PR."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          BRANCH="auto-update-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git commit -m "chore: automated update [skip ci]"
          git push origin "$BRANCH" || echo "Push failed. Check token permissions."

      - name: Create Pull Request
        if: steps.detect.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "chore: automated update"
          branch: "auto-update-${{ github.run_id }}"
          title: "Auto-update sync"
          body: "Triggered automatically. Review & merge when ready."
          delete-branch: true
